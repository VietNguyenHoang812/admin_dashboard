services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: admin_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    image: admin-dashboard-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: production
      ALLOWED_ORIGINS: https://netmind.viettel.vn
    depends_on:
      - postgres
      - redis

  mock_agent:
    profiles:
      - dev
    image: admin-dashboard-mock-agent:latest
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
