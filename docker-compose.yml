services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: admin_dashboard
    ports:
      - "9123:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - netclaw

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - netclaw

  backend:
    image: vietthevarious/netclaw_admin_dashboard_backend:1.0.0
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "9122:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - netclaw

  frontend:
    image: vietthevarious/netclaw_admin_dashboard-frontend:1.0.0
    ports:
      - "9121:3000"
    depends_on:
      - backend
    networks:
      - netclaw

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8089:8089"
    depends_on:
      - frontend
      - backend
    networks:
      - netclaw

  mock_agent:
    build: ./mock_agent
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - netclaw

volumes:
  postgres_data:
  redis_data:

networks:
  netclaw:
    external: true
    name: grafana_netmind_netmind-grafana
