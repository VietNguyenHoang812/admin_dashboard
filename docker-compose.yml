services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: admin_dashboard
    ports:
      - "9122:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - netclaw

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - netclaw

  backend:
    build: ./backend
    ports:
      - "9900:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - netclaw

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:9900
        NEXT_PUBLIC_BASE_PATH: ""
    ports:
      - "9121:3000"
    depends_on:
      - backend
    networks:
      - netclaw

  mock_agent:
    build: ./mock_agent
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - netclaw

volumes:
  postgres_data:
  redis_data:

networks:
  netclaw:
    driver: bridge
